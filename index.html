<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vicinity">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Vicinity</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="config.js" onerror="console.warn('config.js not found')"></script>
</head>
<body>
  <div id="app">
    <div class="boot-splash">
      <span class="boot-logo">◎</span>
      <span class="boot-name">Vicinity</span>
    </div>
  </div>

  <style>
    .boot-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      gap: 0.5rem;
      background: #0f0f0e;
      color: #E8A87C;
      font-family: 'Crimson Pro', Georgia, serif;
      animation: fadeIn 0.4s ease;
    }
    .boot-logo { font-size: 2.5rem; }
    .boot-name { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.12em; color: #e8e5d8; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <script type="module">
    import { boot } from './js/ui.js';
    requestAnimationFrame(() => setTimeout(boot, 50));
  </script>
</body>
</html>
